<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amoeba Homepage 3D</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://use.typekit.net/nnn5zaj.css">
  <style>
    .scene-text {
      font-family: 'helvetica-neue-lt-pro', 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 64px;
      font-weight: 500;
      text-transform: uppercase;
      line-height: 1.3;
      letter-spacing: 0.02em;
      text-align: center;
      color: white;
    }
    @media (max-width: 768px) {
      .scene-text {
        font-size: 32px;
      }
    }
    @media (min-width: 769px) and (max-width: 1024px) {
      .scene-text {
        font-size: 48px;
      }
    }
  </style>
</head>
<body class="bg-black text-white font-sans">
  <!-- 3D Canvas Container -->
  <div id="canvas-container" class="fixed inset-0 -z-10"></div>

  <!-- Fixed text overlays (화면 중앙 고정, fade in/out) -->
  <!-- 씬 01: SphereDeform -->
  <div class="shape-section fixed inset-0 z-10 flex items-center justify-center pointer-events-none px-4" data-index="0">
    <div class="shape-content opacity-0 absolute w-full">
      <p class="scene-text">DESIGN AND DEVELOP FOR<br>UNDERSTANDING.</p>
    </div>
  </div>

  <!-- 씬 02: SphereOrbital -->
  <div class="shape-section fixed inset-0 z-10 flex items-center justify-center pointer-events-none px-4" data-index="1">
    <div class="shape-content opacity-0 absolute w-full">
      <p class="scene-text">CREATIVITY · CONNECTION · POSSIBILITIES</p>
    </div>
  </div>

  <!-- 씬 03: Gyro -->
  <div class="shape-section fixed inset-0 z-10 flex items-center justify-center pointer-events-none px-4" data-index="2">
    <div class="shape-content opacity-0 absolute w-full">
      <p class="scene-text">AI · CLOUD · DATA CENTER</p>
    </div>
  </div>

  <!-- 씬 04: Model2 -->
  <div class="shape-section fixed inset-0 z-10 flex items-center justify-center pointer-events-none px-4" data-index="3">
    <div class="shape-content opacity-0 absolute w-full">
      <p class="scene-text">WE ARE A CREATIVE<br>CONSULTANCY MAKING CLARITY OUT OF<br>COMPLEXITY.</p>
    </div>
  </div>

  <!-- 씬 05: LineSphere4 -->
  <div class="shape-section fixed inset-0 z-10 flex items-center justify-center pointer-events-none px-4" data-index="4">
    <div class="shape-content opacity-0 absolute w-full">
      <p class="scene-text">FINTECH · SERVICE · COMMUNICATION</p>
    </div>
  </div>


  <!-- Scroll spacer (스크롤 높이 확보) -->
  <div id="content" style="height: 1500vh;"></div>


  <!-- Scroll Progress Indicator (숨김) -->
  <div id="scroll-indicator" class="hidden">
    <div class="h-32 w-1 overflow-hidden rounded-full bg-white/20">
      <div id="scroll-bar" class="w-full rounded-full bg-white transition-all duration-150" style="height: 0%"></div>
    </div>
    <span id="scroll-percent" class="text-xs text-white/60">0%</span>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
